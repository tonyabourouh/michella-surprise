<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Michella</title>

<style>
:root{
--bg1:#ffd6e7;
--bg2:#ffe9f2;
--bg3:#f7d8ff;
--card:rgba(255,255,255,0.72);
--card-border:rgba(255,255,255,0.55);
--text:#2f2430;
--muted:#6c5a68;
--primary:#ff5fa2;
--primary-dark:#f54293;
--secondary:#ffffff;
--shadow:0 18px 45px rgba(122,63,97,0.16);
--shadow-soft:0 8px 22px rgba(122,63,97,0.10);
--radius-xl:26px;
}

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
width:100%;
min-height:100%;
font-family:Inter,"Segoe UI",Arial,sans-serif;
color:var(--text);
}

body{
min-height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top left,rgba(255,255,255,0.65),transparent 30%),
radial-gradient(circle at bottom right,rgba(255,255,255,0.45),transparent 28%),
linear-gradient(135deg,var(--bg1),var(--bg2) 45%,var(--bg3));
padding:20px;
}

.glow{
position:fixed;
width:320px;
height:320px;
border-radius:50%;
filter:blur(70px);
opacity:.28;
pointer-events:none;
z-index:0;
}

.glow.one{top:-70px;left:-70px;background:#ff9fc4;}
.glow.two{right:-90px;bottom:-80px;background:#d9a6ff;}

#intro,#box{
position:relative;
z-index:2;
width:min(92vw,520px);
border:1px solid var(--card-border);
background:var(--card);
backdrop-filter:blur(18px);
box-shadow:var(--shadow);
border-radius:var(--radius-xl);
}

#intro{
padding:42px 30px;
text-align:center;
}

#intro .badge{
display:inline-block;
padding:8px 14px;
font-size:13px;
border-radius:999px;
background:rgba(255,255,255,0.72);
color:var(--primary-dark);
box-shadow:var(--shadow-soft);
margin-bottom:18px;
font-weight:600;
}

#intro h1{
margin:0 0 12px;
font-size:38px;
}

#intro p{
margin:0 0 28px;
color:var(--muted);
font-size:16px;
line-height:1.6;
}

#box{
display:none;
padding:24px 22px 26px;
}

.topbar{margin-bottom:22px;}

.step-label{
display:flex;
justify-content:space-between;
font-size:13px;
color:var(--muted);
font-weight:600;
margin-bottom:10px;
}

#progressContainer{
width:100%;
height:10px;
background:rgba(255,255,255,0.65);
border-radius:999px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
border-radius:999px;
background:linear-gradient(90deg,#ff74b2,#ff5fa2,#f79ac7);
transition:width .35s ease;
}

#question{
margin:0 0 10px;
font-size:28px;
}

#subtext{
margin:0 0 20px;
color:var(--muted);
}

#answers{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
border:none;
cursor:pointer;
padding:13px 18px;
border-radius:14px;
font-size:15px;
font-weight:600;
box-shadow:var(--shadow-soft);
}

.primary-btn{
background:linear-gradient(135deg,var(--primary),#ff7cb8);
color:white;
}

#answers button{
background:white;
color:var(--text);
}

#yesBtn{
background:linear-gradient(135deg,var(--primary),#ff7cb8)!important;
color:white!important;
}

#noBtn{
background:#fff7fb!important;
}

.input-wrap{
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
}

input{
padding:14px;
border-radius:14px;
border:1px solid rgba(179,143,166,0.22);
font-size:15px;
width:260px;
}

.heart{
position:fixed;
top:-20px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(18deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div id="intro">
<div class="badge">a few quick questions ✨</div>
<h1>Hi Michella 🌸</h1>
<p>
I have a few quick questions for you.<br>
It will only take a minute.
</p>
<button class="primary-btn" onclick="startExperience()">Start</button>
</div>

<div id="box">
<div class="topbar">
<div class="step-label">
<span id="progressText">Question 0 of 14</span>
<span id="progressPercent">0%</span>
</div>
<div id="progressContainer">
<div id="progressBar"></div>
</div>
</div>

<h2 id="question"></h2>
<p id="subtext"></p>

<div id="answers">
<button class="primary-btn" onclick="start()">Start</button>
</div>
</div>

<script>

const TOTAL_STEPS=14
let step=0
let answers={}

function startExperience(){
document.getElementById("intro").style.display="none"
document.getElementById("box").style.display="block"
}

function start(){
nextQuestion()
}

function updateProgress(){
const percent=Math.round((step/TOTAL_STEPS)*100)
progressBar.style.width=percent+"%"
progressText.innerText="Question "+Math.min(step,TOTAL_STEPS)+" of "+TOTAL_STEPS
progressPercent.innerText=percent+"%"
}

function nextQuestion(){
step++
updateProgress()

if(step===1){
showQuestion("Do you usually prefer indoor places or outdoor ones?",["Indoor","Outdoor","Both"])
}

else if(step===2){
showQuestion("What kind of atmosphere do you enjoy more when going out?",["Quiet and calm","Lively and energetic","Depends on the mood"])
}

else if(step===3){
showQuestion("Do you prefer places with a nice view or something simple and comfortable?",["Nice view","Simple and comfortable","Either"])
}

else if(step===4){
showQuestion("What kind of place feels most comfortable to you?",["Cozy and relaxed","Stylish and elegant","Casual and simple"])
}

else if(step===5){
showQuestion("What do you enjoy more?",["Coffee","Dessert","Full meal"])
}

else if(step===6){
document.getElementById("question").innerText="Favorite type of food?"
answers.innerHTML=`<button onclick="saveFood('Italian')">Italian</button>
<button onclick="saveFood('Asian')">Asian</button>
<button onclick="saveFood('Lebanese')">Lebanese</button>
<button onclick="saveFood('Fast food')">Fast food</button>
<button onclick="askOtherFood()">Other</button>`
}

else if(step===7){
question.innerText="Do you prefer trying new places or going to known favorites?"
answers.innerHTML=`<button onclick="askPlace('New places')">New places</button>
<button onclick="askPlace('Favorite places')">Favorite places</button>`
}

else if(step===8){
showQuestion("When going out to eat what matters more?",["The food","The place","Both equally"])
}

else if(step===9){
showQuestion("Which sounds more fun for a first date?",["Coffee and talking","Dinner somewhere nice","Dessert place"])
}

else if(step===10){
showQuestion("Do you enjoy long conversations when going out?",["Yes, I love talking","Sometimes","Not really"])
}

else if(step===11){
showQuestion("What kind of moments do you enjoy the most?",["Laughing a lot","Deep conversations","Just relaxing"])
}

else if(step===12){
showQuestion("What do you enjoy most when getting to know someone?",["Their stories","Their personality","Their way of thinking"])
}

else if(step===13){
question.innerText="What was your first impression of me?"
answers.innerHTML=`<div class="input-wrap">
<input id="textAnswer" placeholder="Type here"/>
<button class="primary-btn" onclick="saveText()">Next</button>
</div>`
}

else if(step===14){
question.innerText="One last question... Would you go on a date with me this Wednesday?"
answers.innerHTML=`<button id="yesBtn" class="primary-btn" onclick="submitAnswers()">Yes 😊</button>
<button id="noBtn">No</button>`
runAway()
}

}

function showQuestion(text,options){
question.innerText=text
answers.innerHTML=""
options.forEach(option=>{
const btn=document.createElement("button")
btn.textContent=option
btn.onclick=()=>saveAnswer(text,option)
answers.appendChild(btn)
})
}

function saveAnswer(q,v){
answers[q]=v
nextQuestion()
}

function saveFood(v){
answers["Favorite type of food?"]=v
nextQuestion()
}

function askOtherFood(){
question.innerText="What other food do you like?"
answers.innerHTML=`<div class="input-wrap">
<input id="foodInput"/>
<button class="primary-btn" onclick="saveOtherFood()">Next</button>
</div>`
}

function saveOtherFood(){
answers["Favorite type of food?"]=foodInput.value
nextQuestion()
}

function askPlace(type){
answers["Do you prefer trying new places or going to known favorites?"]=type
question.innerText=type==="Favorite places"?"Which places are your favorite?":"Which new places would you like to try?"
answers.innerHTML=`<div class="input-wrap">
<input id="placeInput"/>
<button class="primary-btn" onclick="savePlace()">Next</button>
</div>`
}

function savePlace(){
answers["Places mentioned"]=placeInput.value
nextQuestion()
}

function saveText(){
answers["First impression"]=textAnswer.value
nextQuestion()
}

function runAway(){
const btn=document.getElementById("noBtn")
btn.addEventListener("mouseover",()=>{
btn.style.position="fixed"
btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"
})
}

async function submitAnswers(){

answers["Date"]="Yes"

let message="📋 Michella's Answers\n\n"

for(const key in answers){
message+=key+"\n➡ "+answers[key]+"\n\n"
}

const TOKEN="YOUR_BOT_TOKEN"
const CHAT_ID="YOUR_CHAT_ID"

await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT_ID,text:message})
})

question.innerText="Thank you for answering 😊"
answers.innerHTML=""
}

</script>
</body>
</html>
