<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Michella</title>

<style>
/* YOUR ENTIRE STYLE BLOCK — UNCHANGED */
:root{
--bg1:#ffd6e7;
--bg2:#ffe9f2;
--bg3:#f7d8ff;
--card:rgba(255,255,255,0.72);
--card-border:rgba(255,255,255,0.55);
--text:#2f2430;
--muted:#6c5a68;
--primary:#ff5fa2;
--primary-dark:#f54293;
--secondary:#ffffff;
--shadow:0 18px 45px rgba(122,63,97,0.16);
--shadow-soft:0 8px 22px rgba(122,63,97,0.10);
--radius-xl:26px;
}

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
width:100%;
min-height:100%;
font-family:Inter,"Segoe UI",Arial,sans-serif;
color:var(--text);
}

body{
min-height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top left,rgba(255,255,255,0.65),transparent 30%),
radial-gradient(circle at bottom right,rgba(255,255,255,0.45),transparent 28%),
linear-gradient(135deg,var(--bg1),var(--bg2) 45%,var(--bg3));
padding:20px;
}

/* ALL YOUR ORIGINAL CSS REMAINS THE SAME */
</style>
</head>

<body>

<div id="intro">
<h1>Hi Michella 🌸</h1>
<p>I made a small interactive thing for you.<br>It will only take a minute.</p>
<button onclick="startExperience()">Start</button>
</div>

<div id="box" style="display:none;">
<h2 id="question">Hello Michella</h2>
<p id="subtext">I want to ask you a few questions so I can plan something nice.</p>

<div id="answers">
<button onclick="start()">Start</button>
</div>
</div>

<script>

const TOTAL_STEPS = 14
let step = 0
let answers = {}

function startExperience(){
document.getElementById("intro").style.display="none"
document.getElementById("box").style.display="block"
}

function start(){
nextQuestion()
}

function nextQuestion(){

step++

if(step===1){
showQuestion(
"Do you usually prefer indoor places or outdoor ones?",
["Indoor","Outdoor","Both"]
)
}

else if(step===2){
showQuestion(
"What kind of atmosphere do you enjoy more when going out?",
["Quiet and calm","Lively and energetic","Depends on the mood"]
)
}

else if(step===3){
showQuestion(
"Do you prefer places with a nice view or something simple and comfortable?",
["Nice view","Simple and comfortable","Either"]
)
}

else if(step===4){
showQuestion(
"What kind of place feels most comfortable to you?",
["Cozy and relaxed","Stylish and elegant","Casual and simple"]
)
}

else if(step===5){
showQuestion(
"What do you enjoy more?",
["Coffee","Dessert","Full meal"]
)
}

else if(step===6){
document.getElementById("question").innerText="Favorite type of food?"
document.getElementById("answers").innerHTML=`
<button onclick="saveFood('Italian')">Italian</button>
<button onclick="saveFood('Asian')">Asian</button>
<button onclick="saveFood('Lebanese')">Lebanese</button>
<button onclick="saveFood('Fast food')">Fast food</button>
<button onclick="askOtherFood()">Other</button>
`
}

else if(step===7){
document.getElementById("question").innerText="Do you prefer trying new places or going to known favorites?"
document.getElementById("answers").innerHTML=`
<button onclick="askPlace('New places')">New places</button>
<button onclick="askPlace('Favorite places')">Favorite places</button>
`
}

else if(step===8){
showQuestion(
"When going out to eat what matters more?",
["The food","The place","Both equally"]
)
}

else if(step===9){
showQuestion(
"Which sounds more fun for a first date?",
["Coffee and talking","Dinner somewhere nice","Dessert place"]
)
}

else if(step===10){
showQuestion(
"Do you enjoy long conversations when going out?",
["Yes I love talking","Sometimes","Not really"]
)
}

else if(step===11){
showQuestion(
"What kind of moments do you enjoy the most?",
["Laughing a lot","Deep conversations","Just relaxing"]
)
}

else if(step===12){
showQuestion(
"What do you enjoy most when getting to know someone?",
["Their stories","Their personality","Their way of thinking"]
)
}

else if(step===13){
document.getElementById("question").innerText="What was your first impression of me?"
document.getElementById("answers").innerHTML=`
<input id="textAnswer">
<br><br>
<button onclick="saveText()">Next</button>
`
}

else if(step===14){
document.getElementById("question").innerText="One last question... Would you go on a date with me this Wednesday?"
document.getElementById("answers").innerHTML=`
<button id="yesBtn" onclick="submitAnswers()">Yes 😊</button>
<button id="noBtn">No</button>
`
runAway()
}

}

function showQuestion(text,options){

document.getElementById("question").innerText=text

let html=""

options.forEach(option=>{
html+=`<button onclick="saveAnswer('${text}','${option}')">${option}</button>`
})

document.getElementById("answers").innerHTML=html

}

function saveAnswer(q,v){
answers[q]=v
nextQuestion()
}

function saveFood(type){
answers["Favorite type of food?"]=type
nextQuestion()
}

function askOtherFood(){

document.getElementById("question").innerText="What other food do you like?"

document.getElementById("answers").innerHTML=`
<input id="foodInput">
<br><br>
<button onclick="saveOtherFood()">Next</button>
`

}

function saveOtherFood(){
answers["Favorite type of food?"]=foodInput.value
nextQuestion()
}

function askPlace(type){

answers["Do you prefer trying new places or going to known favorites?"]=type

document.getElementById("question").innerText="Which places?"

document.getElementById("answers").innerHTML=`
<input id="placeInput">
<br><br>
<button onclick="savePlace()">Next</button>
`

}

function savePlace(){
answers["Places mentioned"]=placeInput.value
nextQuestion()
}

function saveText(){
answers["First impression"]=textAnswer.value
nextQuestion()
}

function runAway(){

const btn=document.getElementById("noBtn")

btn.addEventListener("mouseover",()=>{
btn.style.position="fixed"
btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"
})

}

/* FIXED YES BUTTON */

function submitAnswers(){

answers["Would you go on a date with me this Wednesday?"]="Yes"

let message="📋 Michella's Answers\n\n"

for(let key in answers){
message+=key+"\n➡ "+answers[key]+"\n\n"
}

const TOKEN="8724648401:AAEbx7IcZzc2fd2ncBi4BwRX-42SW1yWGJw"
const CHAT_ID="7417155452"

fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
})

document.getElementById("question").innerText=
"Thank you for answering, you're so sweet 😊"

document.getElementById("answers").innerHTML=""

}

</script>

</body>
</html>
